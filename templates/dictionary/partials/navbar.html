{% load static %}
        <header class="d-header">
            <div class="d-container d-header__inner">
                <a href="{% url 'home' %}" class="d-logo">
                    <span class="d-logo__icon">🤟</span>
                    <span>Dactylus</span>
                </a>
                <nav class="d-nav">
                    <a href="{% url 'dictionary' %}" class="d-nav__link">Словарь</a>
                    <!-- <a href="" class="d-nav__link">Переводчик</a> -->
                    {% if user.is_authenticated %}<a href="" class="d-nav__link">Мой словарь</a>{% endif %}
                </nav>
                <div class="d-header__actions">
                    <button class="d-theme-toggle" id="themeToggle" aria-label="Переключить тему">
                        <i class="bi bi-moon moon"></i>
                        <i class="bi bi-sun sun"></i>
                    </button>
                    <a href="{% url 'search' %}" class="btn btn-ghost btn-icon" aria-label="Поиск">
                        <i class="bi bi-search"></i>
                    </a>
                    {% if user.is_authenticated %}
                    <form action="{% url 'logout' %}" method="post" style="display: inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-secondary btn-sm">Выйти</button>
                    </form>
                    {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-primary btn-sm">Войти</a>
                    {% endif %}
                </div>
            </div>
        </header>
