{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dactylus — Словарь русского жестового языка{% endblock %}</title>
    <link rel="apple-touch-icon" href="{% static 'images/favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/components/navbar.css' %}">
    {% block page_css %}{% endblock %}
</head>
<body>
    <div class="d-page">
        {% include 'dictionary/partials/navbar.html' %}
        <main class="d-main">
          {% block content %}{% endblock %}
        </main>
        {% include 'dictionary/partials/footer.html' %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/components/navbar.js' %}"></script>
    {% block page_js %}{% endblock %}
</body>
</html>
