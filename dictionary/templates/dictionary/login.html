{% extends 'dictionary/base.html' %}
{% load static %}

{% block page_css %}<link rel="stylesheet" href="{% static 'css/pages/auth.css' %}">{% endblock %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Вход в систему</h1>

        {% if form.errors %}
        <div class="alert alert-error">
            Неверное имя пользователя или пароль.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_username">Имя пользователя</label>
                <input type="text" name="username" id="id_username" class="form-input" required autofocus>
            </div>

            <div class="form-group">
                <label for="id_password">Пароль</label>
                <input type="password" name="password" id="id_password" class="form-input" required>
            </div>

            <input type="hidden" name="next" value="{{ next|default:'/' }}">

            <div class="auth-actions">
                <button type="submit" class="btn btn-primary">Войти</button>
                <a href="{% url 'register' %}" class="btn btn-secondary">Создать аккаунт</a>
            </div>
        </form>
