{% extends 'dictionary/base.html' %}
{% load static %}

{% block page_css %}<link rel="stylesheet" href="{% static 'css/pages/annotation.css' %}">{% endblock %}
{% block title %}Разметка видео{% endblock %}

{% block content %}
<div class="dictionary">
    <div class="section-header">
        <h1 class="section-title">Разметка видео жестов</h1>
        <p>Отмечайте ключевые точки для обучения ИИ</p>
    </div>
</div>

<div class="annotation-tool">
    <div class="video-canvas" id="annotation-canvas">
        <div class="canvas-placeholder">
            <div class="placeholder-icon">🎥</div>
            <p>Загрузите видео для разметки</p>
        </div>
    </div>

    <div class="annotation-controls">
        <h3>Части тела</h3>
        <div class="body-parts">
            <button class="part-btn active">Правая рука</button>
            <button class="part-btn">Левая рука</button>
            <button class="part-btn">Голова</button>
            <button class="part-btn">Туловище</button>
            <button class="part-btn">Лицо</button>
        </div>

        <div class="frame-controls">
            <button class="btn btn-secondary">⏮</button>
            <span>Кадр 1/45</span>
            <button class="btn btn-secondary">⏭</button>
        </div>

        <button class="btn btn-primary" onclick="saveAnnotation()">
            💾 Сохранить разметку
        </button>
    </div>
</div>
{% endblock %}
